name: Release

on:
  push:
    tags:
      - "v*" # Triggers when you push any version tag like v1.0.0

permissions:
  contents: write # Grants the action permission to create a release and upload assets

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Compile Multi-Architecture Binaries
        run: |
          make release
        # This executes your Makefile, reads version.txt, builds binaries inside a fresh, temporary 'dist/' folder on the GitHub server.

      - name: Get Version String
        id: get_version
        run: |
          echo "VERSION=$(cat version.txt)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload Artifacts
        uses: softprops/action-gh-release@v2
        with:
          # This pulls all binaries matching the wildcard pattern from the server's temporary dist folder
          files: |
            dist/font-gen-${{ steps.get_version.outputs.VERSION }}-*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
