name: Release

on:
  push:
    tags:
      - "v*" # Runs when you push v0.2.0, v0.3.0, etc.

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Pulls full tag history to move the rolling 'latest' pointer safely

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Compile Multi-Architecture Binaries
        run: |
          make release

      - name: Get Version String
        id: get_version
        run: |
          echo "VERSION=$(cat version.txt)" >> $GITHUB_OUTPUT

      # 1. This updates the raw git reference "latest" to point to the current commit
      - name: Update Rolling 'latest' Git Tag Pointer
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push origin latest --force

      # 2. This publishes the files under your pushed version tag (e.g., v0.2.0)
      - name: Create Versioned GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/font-gen-${{ steps.get_version.outputs.VERSION }}-*
          generate_release_notes: true
          make_latest: true # Forces GitHub to mark this v0.2.0 release block with the green UI "Latest" badge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. This attaches the exact same binaries to the rolling "latest" tag asset block
      - name: Sync Binaries to Rolling 'latest' Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          files: |
            dist/font-gen-${{ steps.get_version.outputs.VERSION }}-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
